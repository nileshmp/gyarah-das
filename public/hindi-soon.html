<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gyarah Das — हिंदी जल्द आ रही है</title>
<style>
  :root {
    --bg:#faf7f2; --card:#fff; --accent:#b5651d; --accent-dark:#8c4a12;
    --muted:#7a7368; --line:#ece5da;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:"Segoe UI",system-ui,sans-serif; background:var(--bg);
         color:#2b2620; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .wrap { width:100%; max-width:420px; padding:28px 22px 40px; text-align:center; }
  h1 { margin:0; font-size:30px; color:var(--accent-dark); }
  .card { margin-top:24px; background:var(--card); border:1px solid var(--line);
          border-radius:14px; padding:26px 22px; box-shadow:0 4px 12px rgba(140,74,18,.08); }
  .big { font-size:20px; font-weight:700; color:var(--accent-dark); }
  .small { font-size:14px; color:var(--muted); margin-top:8px; line-height:1.6; }
  .back { display:inline-block; margin-top:24px; text-decoration:none; color:var(--accent-dark);
          border:1px solid var(--line); border-radius:20px; padding:9px 18px; font-size:14px; }
  .back:hover { border-color:var(--accent); }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Gyarah Das</h1>
    <div class="card">
      <div class="big">हिंदी संस्करण जल्द आ रहा है</div>
      <div class="small">The Hindi version is coming soon.<br>
        For now, please use the English conversation.</div>
    </div>
    <a class="back" href="/">&larr; Back &middot; वापस जाएँ</a>
  </div>
</body>
</html>
